<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAPORSTOCKS — after-hours exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<div id="auth-screen" class="hidden">
  <div class="auth-card">
    <div class="logo">VAPOR<span>STOCKS</span></div>
    <p class="tagline">Fake stocks. Real grudges.</p>
    <form id="auth-form">
      <input id="auth-name" type="text" placeholder="Trader name" autocomplete="nickname" maxlength="20">
      <input id="auth-email" type="email" placeholder="Email" autocomplete="email" required>
      <input id="auth-pass" type="password" placeholder="Password" autocomplete="current-password" required minlength="6">
      <button type="submit" id="auth-submit">Sign in</button>
    </form>
    <p class="auth-switch">New here? <a href="#" id="auth-toggle">Create an account</a> — you start with ₡1,000.</p>
    <p class="auth-error" id="auth-error"></p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">

  <!-- signature: live ticker tape -->
  <div id="tape-wrap"><div id="tape"></div></div>

  <header>
    <div class="logo sm">VAPOR<span>STOCKS</span></div>
    <div class="header-right">
      <button id="bonus-btn" class="ghost bonus-btn" title="Daily bonus">🎁 ₡50</button>
      <button id="avatar-btn" class="avatar-btn" title="Change profile picture"></button>
      <input id="avatar-file" type="file" accept="image/*" hidden>
      <div class="cash-pill" id="cash-pill">₡ —</div>
      <button class="ghost" id="sign-out">Sign out</button>
    </div>
  </header>

  <nav>
    <button data-view="market" class="tab active">Exchange</button>
    <button data-view="portfolio" class="tab">Portfolio</button>
    <button data-view="news" class="tab">News<span id="news-dot" class="dot hidden"></span></button>
    <button data-view="casino" class="tab">Casino</button>
    <button data-view="predict" class="tab">Predictions</button>
    <button data-view="chat" class="tab">Chat<span id="chat-dot" class="dot hidden"></span></button>
    <button data-view="leaderboard" class="tab">Leaderboard</button>
    <button data-view="admin" class="tab hidden" id="tab-admin">Admin</button>
  </nav>

  <main>
    <section id="view-market" class="view"></section>
    <section id="view-stock" class="view hidden"></section>
    <section id="view-portfolio" class="view hidden"></section>
    <section id="view-news" class="view hidden"></section>
    <section id="view-casino" class="view hidden"></section>
    <section id="view-predict" class="view hidden"></section>
    <section id="view-chat" class="view hidden"></section>
    <section id="view-leaderboard" class="view hidden"></section>
    <section id="view-admin" class="view hidden"></section>
  </main>

  <div id="toast-stack"></div>
</div>

<div id="boot" class="boot">Connecting to the exchange…</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
